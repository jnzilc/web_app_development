{% extends "base.html" %}

{% block title %}捐款感謝 — 線上算命系統{% endblock %}

{% block content %}
<section class="page-section">
    <div class="thanks-container fade-in">
        <div class="thanks-icon bounce">🙏</div>
        <h1 class="thanks-title">感謝你的善心！</h1>
        <div class="thanks-card glass-card">
            <p class="thanks-amount">你已捐出 <strong>NT$ {{ amount }}</strong></p>
            {% if message %}
            <p class="thanks-message">祈願：「{{ message }}」</p>
            {% endif %}
            <div class="thanks-blessing">
                <p>{{ blessing }}</p>
            </div>
        </div>

        <div class="result-actions">
            <a href="{{ url_for('donation.index') }}" class="btn btn-primary">🏮 再捐一次</a>
            <a href="{{ url_for('main.index') }}" class="btn btn-outline">🏠 回首頁</a>
        </div>
    </div>
</section>
{% endblock %}
