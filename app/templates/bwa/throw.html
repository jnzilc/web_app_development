{% extends "base.html" %}

{% block title %}擲筊問事 — 線上算命系統{% endblock %}

{% block content %}
<section class="page-section">
    <div class="section-header">
        <h1>🙏 擲筊問事</h1>
        <p>心中默想一個是非題，虔誠擲出筊杯，聆聽神明的回應。</p>
    </div>

    <div class="bwa-container glass-card">
        <form method="POST" action="{{ url_for('bwa.throw') }}" id="bwaForm">
            <div class="form-group">
                <label class="form-label" for="question">請輸入你的問題（是非題）：</label>
                <textarea name="question" id="question" class="form-input form-textarea"
                          placeholder="例如：我是否適合轉換跑道？" required maxlength="200"></textarea>
                <small class="form-hint">請以「是否」開頭的問題為佳，讓神明能明確回應。</small>
            </div>

            <!-- 筊杯區域 -->
            <div class="bwa-cups" id="bwaCups">
                <div class="bwa-cup">🌙</div>
                <div class="bwa-cup">🌙</div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" id="throwBtn">
                🙏 虔誠擲筊
            </button>
        </form>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('bwaForm').addEventListener('submit', function(e) {
    const cups = document.getElementById('bwaCups');
    const btn = document.getElementById('throwBtn');
    cups.classList.add('throwing');
    btn.textContent = '🙏 擲筊中...';
    btn.disabled = true;
    e.preventDefault();
    setTimeout(() => { this.submit(); }, 1500);
});
</script>
{% endblock %}
