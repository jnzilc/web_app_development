{% extends "base.html" %}

{% block title %}擲筊結果 — 線上算命系統{% endblock %}

{% block content %}
<section class="page-section">
    <div class="section-header">
        <h1>🙏 擲筊結果</h1>
        <p>你的問題：「{{ question }}」</p>
    </div>

    <div class="bwa-result glass-card fade-in">
        <div class="bwa-result-icon">{{ result.emoji }}</div>
        <h2 class="bwa-result-name">{{ result.name }}</h2>
        <p class="bwa-result-desc">{{ result.description }}</p>
        <div class="bwa-result-advice">
            <h3>💡 解讀</h3>
            <p>{{ result.advice }}</p>
        </div>
    </div>

    <div class="result-actions">
        <a href="{{ url_for('bwa.throw') }}" class="btn btn-primary">🔄 再擲一次</a>
        <a href="{{ url_for('history.index') }}" class="btn btn-secondary">📋 查看歷史</a>
        <a href="{{ url_for('main.index') }}" class="btn btn-outline">🏠 回首頁</a>
    </div>
</section>
{% endblock %}
