{% extends "base.html" %}

{% block title %}塔羅牌占卜 — 線上算命系統{% endblock %}

{% block content %}
<section class="page-section">
    <div class="section-header">
        <h1>🃏 塔羅牌占卜</h1>
        <p>選擇占卜主題與牌陣，讓塔羅牌為你揭示命運的指引。</p>
    </div>

    <div class="tarot-select-container glass-card">
        <form method="POST" action="{{ url_for('tarot.select') }}">
            <div class="form-group">
                <label class="form-label">選擇占卜主題：</label>
                <div class="category-grid">
                    {% for topic in topics %}
                    <label class="category-option">
                        <input type="radio" name="topic" value="{{ topic }}" required>
                        <span class="category-label">{{ topic }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">選擇牌陣：</label>
                <div class="spread-grid">
                    {% for key, name in spreads.items() %}
                    <label class="category-option spread-option">
                        <input type="radio" name="spread" value="{{ key }}" required>
                        <span class="category-label">{{ name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                🔮 開始占卜
            </button>
        </form>
    </div>
</section>
{% endblock %}
